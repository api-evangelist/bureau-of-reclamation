  description: The RISE API allows users to query Bureau of Reclamation water resource data programmatically, returning JSON
    objects. For Geospatial and File Upload datasets, only metadata can be queried. For time series datasets, both metadata
    and data can be queried. Data includes hydrometric measurements, reservoir levels, streamflow, and water quality.
  features:
  - Time Series Data
  - Hydrometric Measurements
  - Reservoir Level Data
  - Streamflow Data
  - Water Quality Data
  - Geospatial Metadata
  - JSON Format
  - Paginated Results
  useCases:
  - Water resource planning
  - Drought monitoring
  - Hydroelectric generation analysis
  - Environmental flow studies
  - Water rights management
  - Climate research
  endpoints:
  - path: /catalog-item
    description: Query catalog items
  - path: /catalog-record
    description: Query catalog records
  - path: /location
    description: Query monitoring locations
  - path: /parameter
    description: Query measured parameters
  - path: /result
    description: Query time series results
  - path: /reclamation-region
    description: Query Reclamation regions
  - path: /model-run
    description: Query model run data
