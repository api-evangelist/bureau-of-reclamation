    humanURL: https://data.usbr.gov/rise/api
    properties:
      - url: https://data.usbr.gov/rise/api
        type: Documentation
    description: >-
      This API allows users to query RISE data programmatically and return a
      JavaScript Object Notation (JSON) object. For Geospatial and File Upload
      datasets, only the metadata can be queried. For time series datasets,
      both the metadata and data can be queried.
